name: Update README with Server Stats

on:
  push:
    branches: [ main ]
    paths: [ 'stats.json' ]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: read server stats JSON output and update README
        run: |
          CPU_TEMP=$(jq -r '.cpu_temperature' stats.json)
          echo "cpu temperature: $CPU_TEMP" >> README.tmp.md

          mv README.tmp.md README.md

      - name: commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "[AUTOMATED] update README with latest server stats"
          git push
