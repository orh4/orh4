name: README updater

on:
  push:
    branches: [ main ]
    paths: [ 'stats.json' ]

  schedule:
    - cron: '*/15 * * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: Read stats.json and update README
        run: |
          # Read the stats.json file
          CPU_TEMP=$(jq -r '.cpu_temperature' stats.json)
          ENERGY_RATE=$(jq -r '.energy_rate' stats.json)
          BATTERY_PCT=$(jq -r '.battery_percentage' stats.json)
          BATTERY_TIME=$(jq -r '.battery_time_left' stats.json)
          UPTIME=$(jq -r '.uptime' stats.json)
          LATENCY=$(jq -r '.latency' stats.json)
          LAST_UPDATED=$(jq -r '.last_updated' stats.json)

          # Create a temporary file with the new README content
          cat > README.tmp.md << 'EOF'

          | stat | value |
          | :--- | :--- |
          | **CPU Temperature** | [CPU_TEMP_PLACEHOLDER] |
          | **Power Draw** | [ENERGY_RATE_PLACEHOLDER] |
          | **Battery** | [BATTERY_PCT_PLACEHOLDER] ([BATTERY_TIME_PLACEHOLDER] remaining) |
          | **Uptime** | [UPTIME_PLACEHOLDER] |
          | **Network Latency** | [LATENCY_PLACEHOLDER] |

          *Last updated: [LAST_UPDATED_PLACEHOLDER]*

          ---
          *[server-stats-github-badges](https://github.com/orh4/server-stats-github-badges).*
          EOF

          sed -i "s|[CPU_TEMP_PLACEHOLDER]|$CPU_TEMP|g" README.tmp.md
          sed -i "s|[ENERGY_RATE_PLACEHOLDER]|$ENERGY_RATE|g" README.tmp.md
          sed -i "s|[BATTERY_PCT_PLACEHOLDER]|$BATTERY_PCT|g" README.tmp.md
          sed -i "s|[BATTERY_TIME_PLACEHOLDER]|$BATTERY_TIME|g" README.tmp.md
          sed -i "s|[UPTIME_PLACEHOLDER]|$UPTIME|g" README.tmp.md
          sed -i "s|[LATENCY_PLACEHOLDER]|$LATENCY|g" README.tmp.md
          sed -i "s|[LAST_UPDATED_PLACEHOLDER]|$LAST_UPDATED|g" README.tmp.md

          mv README.tmp.md README.md

      - name: commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "[AUTOMATED] update README with latest server stats"
          git push
